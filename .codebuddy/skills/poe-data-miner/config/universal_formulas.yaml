# ============================================================
# POE2 通用公式卡片库 (Universal Formula Cards)
# ============================================================
# 来源: CalcOffence.lua + CalcDefence.lua + CalcPerform.lua
# 这些公式对所有角色/技能通用，参数化表示
# 查询方式: 关键词匹配
# ============================================================

version: "2.2.0"  # v2.2: 添加装备词缀能量来源 (v5扩展)
source_pob_version: "0.4"

formulas:

  # ============================================================
  # 进攻 - DPS 核心
  # ============================================================

  - id: dps_core
    name: DPS核心公式
    name_en: Core DPS Formula
    domain: offence
    category: dps
    keywords: [DPS, 每秒伤害, damage per second, 总DPS, total dps]
    formula: "TotalDPS = AverageDamage × (HitSpeed or Speed) × dpsMultiplier × quantityMultiplier"
    parameters:
      AverageDamage: "单次平均伤害（暴击加权）× HitChance/100"
      HitSpeed: "触发/其他技能的特殊速率（优先于Speed）"
      Speed: "攻击/施法速度（次/秒）"
      dpsMultiplier: "DPS倍率（trap/mine/totem等额外系数）"
      quantityMultiplier: "数量倍率（额外投射物等，skillModList:Sum('BASE','Quantity')）"
    notes: |
      来源: CalcOffence.lua L4051-4063
      AverageHit = nonCritAvg × (1-CritChance%) + critAvg × CritChance%
      AverageDamage = AverageHit × HitChance/100
      对所有Hit技能通用，DoT技能走独立公式
    source_file: "Modules/CalcOffence.lua"
    source_lines: "L4050-4063"

  - id: average_hit
    name: 平均伤害（暴击加权）
    name_en: Average Hit (Crit-Weighted)
    domain: offence
    category: dps
    keywords: [平均伤害, average hit, 暴击, crit, 期望伤害]
    formula: "AverageHit = nonCritAvg × (1 - CritChance/100) + critAvg × (CritChance/100)"
    parameters:
      nonCritAvg: "非暴击平均伤害 = (minDmg + maxDmg) / 2"
      critAvg: "暴击平均伤害 = nonCritAvg × CritMultiplier"
      CritChance: "有效暴击率（百分比，上限100）"
    notes: "CritMultiplier默认1.5(150%)，通过modifier可增加"
    source_file: "Modules/CalcOffence.lua"
    source_lines: "L3644-3937, L4050"

  - id: damage_calc
    name: 单次伤害计算
    name_en: Per-Hit Damage Calculation
    domain: offence
    category: damage
    keywords: [伤害计算, damage calculation, INC, MORE, 加成, 增益]
    formula: "finalDmg = round(summedMin × inc × more × moreMinMax + addMin)"
    parameters:
      summedMin: "各来源基础伤害之和"
      inc: "1 + INC/100（所有increased加成线性叠加）"
      more: "所有more乘数之积 = skillModList:More(...)"
      moreMinMax: "最小/最大伤害独立的more系数"
      addMin: "在INC×MORE之后附加的伤害（非base的一部分）"
    notes: |
      每种伤害类型(Physical/Lightning/Cold/Fire/Chaos)独立计算
      关键: addMin在乘法之后加入，不在base内
    source_file: "Modules/CalcOffence.lua"
    source_lines: "L110-158 (calcDamage函数)"

  - id: base_damage
    name: 基础伤害来源
    name_en: Base Damage Sources
    domain: offence
    category: damage
    keywords: [基础伤害, base damage, 附加伤害, added damage, 武器伤害]
    formula: "baseMin = (source[typeMin] + source[typeBonusMin] + addedMin × addedMult) × baseMultiplier"
    parameters:
      source[typeMin]: "基础伤害源（武器或技能）"
      source[typeBonusMin]: "额外奖励伤害（BonusMin/BonusMax字段）"
      addedMin: "附加伤害（来自装备/buff/技能）"
      addedMult: "附加伤害效率 = calcLib.mod('Added'+type+'Damage','AddedDamage')"
      baseMultiplier: "基础伤害倍率（如Earthquake aftershock）"
    notes: |
      来源: CalcOffence.lua L3568-3612
      addedMult包含类型特定和通用AddedDamage修正
      法术不使用weaponDmg，攻击有MainHand/OffHand双pass
    source_file: "Modules/CalcOffence.lua"
    source_lines: "L3568-3612"

  - id: damage_conversion
    name: 伤害转换
    name_en: Damage Conversion
    domain: offence
    category: damage
    keywords: [伤害转换, damage conversion, 转换, convert, 元素转换]
    formula: "convertedPercent = min(skillConv + globalConv, 100) per conversion pair"
    parameters:
      skillConv: "技能自身的转换百分比"
      globalConv: "全局转换百分比（来自装备/天赋）"
    notes: |
      转换链: Physical → Lightning → Cold → Fire → Chaos
      两步过程: 先技能转换，再全局转换
      每条转换链总和上限100%
      转换后的伤害保留原始类型的加成
    source_file: "Modules/CalcOffence.lua"
    source_lines: "L2092-2220"

  - id: hit_chance
    name: 命中率
    name_en: Hit Chance
    domain: offence
    category: accuracy
    keywords: [命中率, hit chance, 命中, accuracy, 准确度]
    formula: "HitChance = (1 - 0.95 × targetEvasion / (targetEvasion + 4 × Accuracy)) × 100"
    parameters:
      Accuracy: "角色准确度 = floor(baseAccuracy × (1 + INC/100) × MORE)"
      targetEvasion: "目标闪避值"
    notes: |
      法术自动命中（无需准确度）
      公式来源: CalcDefence.lua L41 calcs.monsterHitChance
      攻击有 accuracyVsEnemy 单独计算（含距离惩罚）
      上限100%，下限5%
      Accuracy 计算含 enemy SelfAccuracy 修正
    source_file: "Modules/CalcOffence.lua + CalcDefence.lua"
    source_lines: "L2409-2427 (accuracy calc), CalcDefence L39-44 (hit formula)"

  - id: crit_chance
    name: 暴击率
    name_en: Critical Strike Chance
    domain: offence
    category: crit
    keywords: [暴击率, crit chance, 暴击, critical strike]
    formula: "effectiveCrit = min((baseCrit + flatBase) × (1 + INC/100) × MORE, CritChanceCap)"
    parameters:
      baseCrit: "基础暴击率（武器CritChance或技能baseCrit）"
      flatBase: "固定暴击加成（Sum BASE CritChance）"
      INC: "所有暴击率increased加成之和"
      MORE: "暴击率more乘数之积"
      CritChanceCap: "暴击率上限（Override或Sum BASE CritChanceCap）"
    notes: |
      来源: CalcOffence.lua L3397-3467
      攻击暴击需乘以AccuracyHitChance（法术不需要）
      Lucky: CritChanceLucky = 1-(1-crit%)^2
      BifurcateCrit: 暴击分岔 = 同Lucky公式
      CritMultiplier: (extraDamage×extraDamageInc×extraDamageMore)
    source_file: "Modules/CalcOffence.lua"
    source_lines: "L3390-3510"

  - id: attack_speed
    name: 攻击/施法速度
    name_en: Attack/Cast Speed
    domain: offence
    category: speed
    keywords: [攻击速度, 施法速度, attack speed, cast speed, speed, 速度]
    formula: "Speed = 1 / (baseTime / round((1 + INC/100) × MORE, 2) + TotalAttackTime + TotalCastTime)"
    parameters:
      baseTime: "基础时间（攻击:1/AttackRate, 法术:castTime）"
      INC: "所有speed increased加成之和"
      MORE: "所有speed more乘数之积"
      TotalAttackTime: "额外攻击时间（Sum BASE TotalAttackTime）"
      TotalCastTime: "额外施法时间（Sum BASE TotalCastTime）"
    notes: |
      来源: CalcOffence.lua L2549-2698
      selfCast时额外乘以ActionSpeedMod
      多种特殊路径: triggered/fixedCastTime/triggerRate/timeOverride/channel
      Totem: 额外乘TotemActionSpeed
      上限: min(Speed, ServerTickRate × Repeats)（非Channel技能）
      Cooldown限制: min(Speed, 1/Cooldown × Repeats)
    source_file: "Modules/CalcOffence.lua"
    source_lines: "L2549-2718"

  # ============================================================
  # 进攻 - DoT (持续伤害)
  # ============================================================

  - id: dot_damage
    name: DoT伤害公式
    name_en: Damage over Time Formula
    domain: offence
    category: dot
    keywords: [DoT, 持续伤害, damage over time, 中毒, poison, 点燃, ignite, 流血, bleed]
    formula: "totalDoT = baseVal × (1 + INC/100) × MORE × (1 + dotMulti/100) × auraMult × effMult"
    parameters:
      baseVal: "DoT基础值（来自技能或Ailment）"
      INC: "所有DoT相关increased加成之和"
      MORE: "所有DoT相关more乘数之积"
      dotMulti: "DoT Multiplier（独立乘区）"
      auraMult: "光环/诅咒带来的受击增伤"
      effMult: "对目标的有效倍率（抗性、暴露等计入）"
    notes: |
      Ailment DoT的baseVal来自Hit伤害的一定比例
      Ignite = Hit × 0.9 / 4s, Poison = Hit × 0.3 / 2s 等
    source_file: "Modules/CalcOffence.lua"
    source_lines: "L5467-5609"

  - id: combined_dps
    name: 综合DPS
    name_en: Combined DPS
    domain: offence
    category: dps
    keywords: [综合DPS, combined DPS, 总DPS, total DPS, 汇总]
    formula: "CombinedDPS = Σ(各DPS来源) × CullMultiplier × ReservationDpsMultiplier"
    parameters:
      DPS来源: |
        以下来源按条件累加:
        - TotalDPS (Hit DPS, 或 AverageDamage 如showAverage)
        - BleedDPS / PoisonDPS / IgniteDPS (异常状态DoT)
        - DecayDPS (衰减)
        - TotalDot (非异常状态DoT)
        - ImpaleDPS (穿刺)
        - MirageDPS (分身/幻影)
        - BurningGroundDPS / CausticGroundDPS (地面效果)
        - CorruptingBloodDPS (腐化之血)
      CullMultiplier: "击杀加速（Culling Strike等）"
      ReservationDpsMultiplier: "保留类技能DPS修正"
    notes: |
      来源: CalcOffence.lua L5729-5871
      各DPS来源是条件性叠加（检查对应flag/output是否存在）
      所有ailment DPS受 DotDpsCap 上限限制
      showAverage模式下使用AverageDamage替代TotalDPS
    source_file: "Modules/CalcOffence.lua"
    source_lines: "L5729-5872"

  - id: skill_cooldown
    name: 技能冷却时间
    name_en: Skill Cooldown
    domain: offence
    category: cooldown
    keywords: [冷却, cooldown, CD, 冷却时间, cooldown recovery]
    formula: "cooldown = baseCooldown / (1 + CooldownRecoveryInc/100) / CooldownRecoveryMore"
    parameters:
      baseCooldown: "基础冷却时间（秒）"
      CooldownRecoveryInc: "冷却回复速度increased加成之和"
      CooldownRecoveryMore: "冷却回复速度more乘数之积"
    notes: "冷却时间向上取整到server tick（约33ms）"
    source_file: "Modules/CalcOffence.lua"
    source_lines: "L322-336 (calcSkillCooldown)"

  - id: skill_duration
    name: 技能持续时间
    name_en: Skill Duration
    domain: offence
    category: duration
    keywords: [持续时间, duration, 技能持续]
    formula: "duration = (baseDuration + addedDuration) × durationMod [× debuffDurationMult]"
    parameters:
      baseDuration: "基础持续时间（秒，skillData.duration）"
      addedDuration: "额外持续时间（Sum BASE Duration + PrimaryDuration）"
      durationMod: "持续时间修正 = calcLib.mod('Duration','PrimaryDuration','DamagingAilmentDuration'[,'MineDuration'])"
      debuffDurationMult: "debuff持续倍率（仅skillData.debuff为true时）= 1 / max(BuffExpirationSlowCap, calcLib.mod(enemyDB,'BuffExpireFaster'))"
    notes: |
      来源: CalcOffence.lua L349-362 calcSkillDuration
      durationMod最小值为0（max(mod, 0)）
      MineDuration仅在 skillData.mineDurationAppliesToSkill 时计入
      debuffDurationMult仅对标记为debuff的技能生效
    source_file: "Modules/CalcOffence.lua"
    source_lines: "L349-362 (calcSkillDuration)"

  - id: area_of_effect
    name: 范围效果
    name_en: Area of Effect
    domain: offence
    category: aoe
    keywords: [范围, AoE, area of effect, 效果范围, radius]
    formula: "radius = floor(baseRadius × floor(100 × sqrt(areaMod)) / 100)"
    parameters:
      baseRadius: "基础范围半径"
      areaMod: "范围效果修正 = (1 + AreaInc/100) × AreaMore (INC和MORE先合并为一个乘数)"
    notes: |
      来源: CalcOffence.lua L161-162 calcRadius函数
      关键: 对INC×MORE的合积取sqrt，不是分别对INC和MORE取sqrt
      有两层floor操作：内层floor(100×sqrt)，外层floor(result)
      面积∝r²，所以modifier对半径取平方根
    source_file: "Modules/CalcOffence.lua"
    source_lines: "L161-162 (calcRadius)"

  # ============================================================
  # 防御 - 护甲/闪避/ES
  # ============================================================

  - id: armour_reduction
    name: 护甲物理减伤
    name_en: Armour Physical Damage Reduction
    domain: defence
    category: armour
    keywords: [护甲, armour, 物理减伤, physical reduction, 减伤, damage reduction]
    formula: "reduction = armour / (armour + rawDamage × 10)"
    parameters:
      armour: "角色总护甲值"
      rawDamage: "敌人的物理打击伤害"
    notes: |
      护甲只减物理打击伤害，不减DoT
      减伤率随受击伤害增加而降低
      需要高护甲值才能减少大伤害
    source_file: "Modules/CalcDefence.lua"
    source_lines: "L55-64 (calcs.armourReductionF)"

  - id: armour_total
    name: 总护甲值计算
    name_en: Total Armour Calculation
    domain: defence
    category: armour
    keywords: [总护甲, total armour, 护甲计算]
    formula: "totalArmour = Σ(slotArmour × slotMulti) × (1 + ArmourInc/100) × ArmourMore"
    parameters:
      slotArmour: "每件装备的基础护甲值"
      slotMulti: "装备位置倍率（body armour = ×2）"
      ArmourInc: "所有护甲increased加成之和"
      ArmourMore: "所有护甲more乘数之积"
    notes: "POE2中body armour（胸甲）防御值翻倍"
    source_file: "Modules/CalcDefence.lua"
    source_lines: "L1112-1350"

  - id: evasion_chance
    name: 闪避率
    name_en: Evasion Chance
    domain: defence
    category: evasion
    keywords: [闪避, evasion, 闪避率, evade chance, 回避]
    formula: "evadeChance = 0.95 × evasion / (evasion + 4 × monsterAccuracy)"
    parameters:
      evasion: "角色总闪避值"
      monsterAccuracy: "怪物准确度"
    notes: |
      来源: CalcDefence.lua L41: rawChance = (1 - (0.95 * evasion) / (evasion + 4 * accuracy)) * 100
      evadeChance = 1 - rawChance/100 = 0.95 × evasion / (evasion + 4 × accuracy)
      闪避使用entropy系统（不是纯随机），确保在长期中趋近概率
      有 Lucky/Unlucky 机制影响最终闪避判定
    source_file: "Modules/CalcDefence.lua"
    source_lines: "L39-44 (calcs.monsterHitChance)"

  - id: energy_shield
    name: 能量护盾计算
    name_en: Energy Shield Calculation
    domain: defence
    category: energy_shield
    keywords: [能量护盾, ES, energy shield, 护盾]
    formula: "totalES = Σ(slotES × slotMulti) × (1 + ESInc/100) × ESMore"
    parameters:
      slotES: "每件装备的基础ES值"
      slotMulti: "装备位置倍率（body armour = ×2）"
      ESInc: "所有ES increased加成之和"
      ESMore: "所有ES more乘数之积"
    notes: "ES在受击后有延迟回充机制（见es_recharge公式）"
    source_file: "Modules/CalcDefence.lua"
    source_lines: "L1112-1350"

  # ============================================================
  # 防御 - 抗性
  # ============================================================

  - id: resistance_calc
    name: 抗性计算
    name_en: Resistance Calculation
    domain: defence
    category: resistance
    keywords: [抗性, resistance, 火抗, 冰抗, 电抗, 混沌抗, 元素抗性, fire resistance, cold resistance, lightning resistance, chaos resistance]
    formula: "finalRes = min(totalRes, maxRes) ; effectiveRes = finalRes - penalty"
    parameters:
      totalRes: "总抗性 = 基础 + Σ(所有抗性来源)"
      maxRes: "抗性上限 = 75% + Σ(maxRes来源)"
      penalty: "难度/地图惩罚"
    notes: |
      四种元素: Fire, Cold, Lightning, Chaos
      overcap = totalRes - maxRes （过上限部分在某些机制中有用）
      Exposure 和 Penetration 在进攻方计算，不影响防御面板
    source_file: "Modules/CalcDefence.lua"
    source_lines: "L745-938"

  # ============================================================
  # 防御 - 格挡/闪避/压制
  # ============================================================

  - id: block_chance
    name: 格挡率
    name_en: Block Chance
    domain: defence
    category: block
    keywords: [格挡, block, 格挡率, block chance, 攻击格挡, 法术格挡]
    formula: "blockChance = min((baseBlock + flatBlock) × calcLib.mod('BlockChance'), BlockChanceMax)"
    parameters:
      baseBlock: "基础格挡率（盾牌BlockChance + Weapon3等）"
      flatBlock: "固定格挡加成（Sum BASE BlockChance）"
      calcLib.mod: "格挡修正 = (1 + BlockInc/100) × BlockMore"
      BlockChanceMax: "格挡上限（Override 或 Sum BASE）"
    notes: |
      来源: CalcDefence.lua L970-1050
      攻击格挡和法术格挡完全分开计算
      法术格挡: SpellBlockChanceIsBlockChance标记或独立计算
      ProjectileBlockChance: 投射物格挡独立加成
      Lucky/Unlucky: 格挡判定受lucky影响
      BlockEffect: 格挡不一定完全免疫(100-BlockEffect%)
      Override: ReplaceShieldBlock可覆盖基础值
      CannotBlockAttacks/CannotBlockSpells标记
    source_file: "Modules/CalcDefence.lua"
    source_lines: "L954-1050"

  - id: spell_suppression
    name: 法术压制
    name_en: Spell Suppression
    domain: defence
    category: suppression
    keywords: [法术压制, spell suppression, 压制, suppression]
    formula: "suppressionChance = min(Override OR baseSum × calcLib.mod('SpellSuppression'), SuppressionChanceCap)"
    parameters:
      baseSum: "Sum BASE SpellSuppressionChance（所有来源加和）"
      calcLib.mod: "SpellSuppression修正（INC×MORE）"
      SuppressionChanceCap: "压制率上限（data.misc.SuppressionChanceCap）"
    notes: |
      来源: CalcDefence.lua L1476-1507
      Override: SpellSuppressionChance可被覆盖
      Lucky/Unlucky机制影响判定
      SpellSuppressionEffect: 修改压制减伤比例（默认50%）
      ConvertSpellSuppressionToSpellDodge: 可转换为法术闪避
    source_file: "Modules/CalcDefence.lua"
    source_lines: "L1476-1507"

  # ============================================================
  # 防御 - 生命/魔力池
  # ============================================================

  - id: life_pool
    name: 生命值计算
    name_en: Life Pool
    domain: defence
    category: pool
    keywords: [生命, life, 生命值, 最大生命, maximum life, HP]
    formula: "maxLife = (baseLife × (1 - conv/100) + extraLife) × (1 + LifeInc/100) × LifeMore"
    parameters:
      baseLife: "基础生命（Sum BASE Life，含等级/力量等）"
      conv: "转换百分比（LifeConvertToEnergyShield + LifeConvertToArmour + LifeConvertToEvasion，上限100%）"
      extraLife: "从其他资源转换来的生命（Sum BASE ExtraLife）"
      LifeInc: "生命increased加成之和"
      LifeMore: "生命more乘数之积"
    notes: |
      来源: CalcDefence.lua L72-117 calcs.doActorLifeManaSpirit
      Override: 可直接覆盖最终值
      最小值为1
      ChaosInoculation: Life强制为1
    source_file: "Modules/CalcDefence.lua"
    source_lines: "L72-119"

  - id: mana_pool
    name: 魔力值计算
    name_en: Mana Pool
    domain: defence
    category: pool
    keywords: [魔力, mana, 魔力值, 最大魔力, maximum mana, MP]
    formula: "maxMana = (baseMana × (1 - conv/100) + extraMana) × (1 + ManaInc/100) × ManaMore"
    parameters:
      baseMana: "基础魔力（Sum BASE Mana）"
      conv: "转换百分比（ManaConvertToEnergyShield等，上限100%）"
      extraMana: "从其他资源转换来的魔力"
      ManaInc: "魔力increased加成之和"
      ManaMore: "魔力more乘数之积"
    notes: |
      来源: CalcDefence.lua L72-117 calcs.doActorLifeManaSpirit
      与Life/Spirit共用相同的通用公式
      Override: 可直接覆盖最终值
    source_file: "Modules/CalcDefence.lua"
    source_lines: "L72-117"

  # ============================================================
  # 恢复 - 偷取
  # ============================================================

  - id: leech_max_rate
    name: 偷取速率上限
    name_en: Maximum Leech Rate
    domain: recovery
    category: leech
    keywords: [偷取, leech, 偷取上限, 偷取速率, max leech rate, 生命偷取, 魔力偷取, life leech, mana leech]
    formula: "MaxLeechRate = Pool × MaxLeechPercent / 100"
    parameters:
      Pool: "对应资源池（Life/Mana/ES）"
      MaxLeechPercent: "最大偷取速率百分比（Life默认20%，Mana默认20%）"
    notes: |
      每个偷取实例独立: instanceRate = Pool × 2% / 秒
      多个实例叠加但受MaxLeechRate上限
      Overleech: 满血时偷取不停止（特殊modifier）
    source_file: "Modules/CalcDefence.lua"
    source_lines: "L1571-1603"

  - id: leech_instance
    name: 偷取实例
    name_en: Leech Instance Rate
    domain: recovery
    category: leech
    keywords: [偷取实例, leech instance, 单次偷取, 偷取速度]
    formula: "instanceRate = Pool × instancePercent / 100 / second"
    parameters:
      Pool: "资源池大小"
      instancePercent: "每实例偷取速率（默认2%/秒）"
    notes: "可通过 leech_speed_+% modifier修改实例速率"
    source_file: "Modules/CalcDefence.lua"
    source_lines: "L1571-1603"

  - id: leech_amount
    name: 偷取量
    name_en: Leech Amount per Hit
    domain: recovery
    category: leech
    keywords: [偷取量, leech amount, 偷取比例, 伤害偷取]
    formula: "leechAmount = damage × leechPercent / 100"
    parameters:
      damage: "造成的伤害（对应类型）"
      leechPercent: "偷取比例（如 life_leech_from_any_damage_permyriad / 100）"
