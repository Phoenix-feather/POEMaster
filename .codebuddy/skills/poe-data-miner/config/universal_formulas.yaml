    source_file: "Modules/CalcDefence.lua"
    source_lines: "L1571-1603"

  # ============================================================
  # 恢复 - 再生
  # ============================================================

  - id: regen_formula
    name: 再生公式
    name_en: Regeneration Formula
    domain: recovery
    category: regen
    keywords: [再生, regen, regeneration, 生命再生, 魔力再生, 能量护盾再生, life regen, mana regen, ES regen]
    formula: "regen = (flatRegen + Pool × regenPercent/100) × (1 + RegenInc/100) × RegenMore"
    parameters:
      flatRegen: "固定再生值（每秒）"
      Pool: "资源池大小（Life/Mana/ES）"
      regenPercent: "基于池大小的再生百分比"
      RegenInc: "再生速度increased加成之和"
      RegenMore: "再生速度more乘数之积"
    notes: |
      适用于 Life/Mana/ES/Rage 四种资源
      再生 vs 回充: 再生持续，回充有延迟+全速率
    source_file: "Modules/CalcDefence.lua"
    source_lines: "L1606-1684"

  - id: es_recharge
    name: ES回充
    name_en: Energy Shield Recharge
    domain: recovery
    category: recharge
    keywords: [ES回充, energy shield recharge, 回充, recharge, 能量护盾回充]
    formula: "rechargeRate = maxES × EnergyShieldRechargeBase × (1 + RechargeInc/100) × RechargeMore"
    parameters:
      maxES: "最大能量护盾"
      EnergyShieldRechargeBase: "回充基础速率（来自data.misc，由character constants中energy_shield_recharge_rate_per_minute_%/60/100计算得到，非固定33.3%）"
      RechargeInc: "回充速率increased加成之和"
      RechargeMore: "回充速率more乘数之积"
    notes: |
      回充有延迟（默认约2秒），受击后重置计时
      回充开始后按rechargeRate恒速回复直到满
      Faster Start of Recharge 减少延迟
    source_file: "Modules/CalcDefence.lua"
    source_lines: "L1686-1750"

  # ============================================================
  # 防御 - 受击计算
  # ============================================================

  - id: damage_taken
    name: 受击伤害计算
    name_en: Damage Taken Calculation
    domain: defence
    category: damage_taken
    keywords: [受击伤害, damage taken, 减伤, mitigation, 伤害承受]
    formula: "damageTaken = rawDamage × (1 - armourDR%) × (1 - flatDR%) × (1 - resistance%) × AfterReductionMult × takenMod"
    parameters:
      rawDamage: "原始伤害（经过damage shift/conversion后）"
      armourDR%: "护甲物理减伤（仅物理）= armour/(armour+rawDmg×10) - overwhelm%"
      flatDR%: "固定减伤百分比（如endurance charges）"
      resistance%: "对应类型抗性"
      AfterReductionMult: "减伤后乘数（AfterReductionTakenHitMulti等）"
      takenMod: "受击修正 = (1+takenInc%) × takenMore"
    notes: |
      来源: CalcDefence.lua L417-454 calcs.takenHitFromDamage
      完整流程: 伤害类型shift → 护甲/减伤 → 抗性 → 后置乘数
      damageShiftTable: 伤害类型转换（Physical→Lightning等）
      overwhelm: 敌人的overwhelm减少护甲减伤效果
      VaalArcticArmourMitigation: 特殊减伤机制
    source_file: "Modules/CalcDefence.lua"
    source_lines: "L417-454 (calcs.takenHitFromDamage)"

  - id: ehp_estimation
    name: 有效生命估算
    name_en: Effective HP Estimation
    domain: defence
    category: ehp
    keywords: [有效生命, EHP, effective HP, 坦度, 生存能力, survivability]
    formula: "EHP = Life / (1 - totalMitigation)"
    parameters:
      Life: "当前生命池（包含ES如果先消耗ES）"
      totalMitigation: "总减伤率 = 1 - Π(1 - 各层减伤)"
    notes: |
      EHP是简化估算，实际生存受多层减伤叠加影响
      包含: 抗性 × 护甲减伤 × 格挡概率 × 闪避概率 × 其他
    source_file: "Modules/CalcDefence.lua"
    source_lines: "L1987+ (calcs.buildDefenceEstimations)"

  # ============================================================
  # 进攻 - 特殊机制
  # ============================================================

  - id: dual_wield_passes
    name: 双持交替攻击
    name_en: Dual Wield Pass System
    domain: offence
    category: attack
    keywords: [双持, dual wield, 主手, 副手, main hand, off hand, 交替攻击]
    formula: "totalDPS(mode) = combineStat(MainHand, OffHand, mode)"
    parameters:
      mode: |
        4种合并模式:
        OR: 取主手或副手（非双持时）
        ADD: 主手+副手（如DPS）
        AVERAGE: (主手+副手)/2（如暴击率）
        CRIT: doubleHitsWhenDualWielding时=MH+OH-MH×OH/100，否则=AVERAGE
    notes: |
      来源: CalcOffence.lua L2224-2320, L2306-2319 combineStat
      攻击技能: MainHand pass + OffHand pass（各自独立计算）
      法术技能: 只有一个Skill pass
      每个pass独立走完整伤害计算管道
    source_file: "Modules/CalcOffence.lua"
    source_lines: "L2224-2320"

  - id: crossbow_reload
    name: 弩炮装填时间
    name_en: Crossbow Reload Time
    domain: offence
    category: crossbow
    keywords: [弩炮, crossbow, 装填, reload, 装填时间]
    formula: "reloadTime = baseReloadTime / calcLib.mod('ReloadSpeed', 'Speed')"
    parameters:
      baseReloadTime: "基础装填时间"
      calcLib.mod: "装填速度修正（含ReloadSpeed和通用Speed）= (1+INC/100)×MORE"
    notes: |
      来源: CalcOffence.lua L283-320
      通用Speed修正也影响装填速度（攻击速度加成同时加速装填）
    source_file: "Modules/CalcOffence.lua"
    source_lines: "L283-320 (calcCrossbowReloadTime)"

  - id: warcry_cast_time
    name: 战吼施放时间
    name_en: Warcry Cast Time
    domain: offence
    category: warcry
    keywords: [战吼, warcry, 战吼施放时间, warcry cast time]
    formula: "castTime = 1 / min(baseSpeed × calcLib.mod('WarcrySpeed') × actionSpeedMod, ServerTickRate)"
    parameters:
      baseSpeed: "基础施放速率 = 1 / WarcryCastTime"
      calcLib.mod: "WarcrySpeed修正 = (1 + WarcrySpeedInc/100) × WarcrySpeedMore"
      actionSpeedMod: "行动速度修正（calcs.actionSpeedMod(actor)）"
      ServerTickRate: "服务器tick率上限cap（约30次/秒）"
    notes: |
      来源: CalcOffence.lua L338-346 calcWarcryCastTime
      速率上限 = min(computedRate, ServerTickRate)
      InstantWarcry标记或SupportedByAutoexertion → castTime=0（即时施放）
    source_file: "Modules/CalcOffence.lua"
    source_lines: "L338-347 (calcWarcryCastTime)"

