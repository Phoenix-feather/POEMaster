  # ============================================================
  # INC/MORE 通用规则
  # ============================================================

  - id: inc_stacking
    name: INC加成叠加规则
    name_en: Increased Modifier Stacking
    domain: general
    category: modifier
    keywords: [INC, increased, 加成叠加, 加法叠加]
    formula: "totalINC = Σ(all_increased_modifiers)"
    parameters:
      all_increased_modifiers: "所有同类increased修饰符的值"
    notes: |
      所有increased修饰符线性相加
      100% increased + 50% increased = 150% increased (不是 ×1.5 ×1.0)
      与base相乘: finalValue = base × (1 + totalINC/100)
    source_file: "Modules/CalcOffence.lua"
    source_lines: "通用规则"

  - id: more_stacking
    name: MORE加成叠加规则
    name_en: More Modifier Stacking
    domain: general
    category: modifier
    keywords: [MORE, more, 乘法叠加, 独立乘区]
    formula: "totalMORE = Π(1 + more_i / 100) for each more modifier"
    parameters:
      more_i: "每个独立的more修饰符的值"
    notes: |
      每个more修饰符独立乘算
      20% more × 30% more = 1.2 × 1.3 = 1.56 (即56% more总增益)
      more修饰符通常来自技能宝石和少数特殊来源
    source_file: "Modules/CalcOffence.lua"
    source_lines: "通用规则"

  # ============================================================
  # 元技能能量系统 (Meta Skills - POB未实现)
  # ============================================================

  - id: meta_energy_gain
    name: 元技能能量获取（通用框架）
    name_en: Meta Skill Energy Generation (General)
    domain: meta
    category: energy
    keywords: [能量, energy, 元技能, meta skill, 能量获取, energy generation, 能量生成]
    formula: "energy = base_factor × (centienergy / 100) × INC_term × MORE_term [× SPECIAL]"
    parameters:
      centienergy: "constantStats中的centienergy值（÷100得到实际值）"
      base_factor: |
        取决于技能子类型:
        SubA: enemy_power × (hit_damage / ailment_threshold)  [monster_power + Ailment Threshold修正]
        SubB: enemy_power                                       [monster_power, 无threshold]
        SubC: 1                                                 [stat名含monster_power但描述无per Power]
        SubD: 1                                                 [固定值事件: block/hit/stun]
        SubE: unit_measure                                      [连续型: per metre/second/charge]
        SubF: base_energy × minion_power_ratio                  [minion_death特殊型]
      INC_term: |
        (1 + Σ(所有energy相关INC stat) / 100)
        已确认的INC来源（7层数据）:
        ① Meta实体自身 stats[]: energy_generated_+% (14/17 Meta实体有)
        ② Meta实体自身 qualityStats[]: energy_generated_+% = 0.75/quality (11/17实体有)
        ③ Support辅助 constantStats[]: energy_generated_+% = 35/45 (Boundless Energy I/II)
        ④ [v4] 被动天赋节点: "Meta Skills gain X% increased Energy" (如passive_3688=15%)
        ⑤ [v4] 升华天赋节点(INC): "Meta Skills gain X% increased Energy" (如passive_4873=20%, Oracle)
        ⑥ [v4] 条件INC(可选): energy_generated_+%_if_crit_recently, energy_generated_+%_on_full_mana
        ⑦ [v5] 装备词缀: ModJewel/ModCorrupted/ModItemExclusive/ModRunes/ModScalability
           → 如珠宝词缀 "Meta Skills gain (4-8)% increased Energy"
           → 如腐化词缀 "Meta Skills gain (20-30)% increased Energy"
        判定规则: stat名含'energy'且以'_+%'结尾(不含_final)，或被动文本含"increased Energy"
      MORE_term: |
        Π(1 + 每个energy相关MORE stat / 100)
        已确认的MORE来源（4层数据）:
        ① [v4] 升华天赋节点: ascendancy_energy_generated_+%_final
           → StatDescriptions: "Meta Skills gain X% more/less Energy"
           → 此stat仅出现在升华天赋，不在Meta技能实体上（所以v3搜索Meta实体=MORE=0是范围错误）
        ② [v4] 被触发法术 constantStats[]: active_skill_energy_generated_+%_final
           → FlameWall(-50%), Incinerate(-98%), SolarOrb(-50%)
           → 这些MORE惩罚在被触发法术上，不在Meta实体上
           → 当法术作为Meta插槽法术时，此惩罚生效于该法术的能量贡献
        ③ [v5] 装备词缀(罕见): ModScalability等可能含 "Meta Skills gain X% more Energy"
        ④ Meta实体自身: 无（17个Meta实体中0个含_+%_final stat — 这是正确的，因为MORE来自外部）
        判定规则: stat名以'_+%_final'结尾，或被动文本含"more/less Energy"
      SPECIAL_term: |
        [可选] ×2 如果 energy_generation_is_doubled 为true
        来源: 被动天赋节点中可能出现 "Energy Generation is doubled"
    notes: |
      ⚠️ POB未实现
      完整能量stat分类谱（6种stat，来自StatDescriptions stat_descriptions.lua）:
      ┌─────────────────────────────────────────────┬────────┬─────────────────────────────────────────┐
      │ Stat ID                                      │ 类型   │ 描述文本                                │
      ├─────────────────────────────────────────────┼────────┼─────────────────────────────────────────┤
      │ energy_generated_+%                          │ INC    │ Meta Skills gain X% increased Energy    │
      │ ascendancy_energy_generated_+%_final         │ MORE   │ Meta Skills gain X% more Energy         │
      │ active_skill_energy_generated_+%_final       │ MORE   │ 技能专属MORE惩罚(Incinerate等)          │
      │ energy_generated_+%_if_crit_recently         │ 条件INC│ ...if dealt Crit Recently               │
      │ energy_generated_+%_on_full_mana             │ 条件INC│ ...while on Full Mana                   │
      │ energy_generation_is_doubled                 │ 特殊×2 │ Energy Generation is doubled            │
      └─────────────────────────────────────────────┴────────┴─────────────────────────────────────────┘
      v4修正: v3错误结论"MORE=0符合预期"的根因 —
        v3只搜索Meta实体自身的4层数据（stats/constantStats/qualityStats/Support辅助），
        从未搜索第5-9层: 被动天赋/升华节点/被触发法术/条件INC/特殊stat。
        实际上ascendancy_energy_generated_+%_final (MORE)存在于升华天赋节点中，
        active_skill_energy_generated_+%_final (MORE)存在于被触发法术(Incinerate等)的constantStats中。
      v5修正: v4缺失装备词缀来源 —
        v4未扫描 ModJewel/ModCorrupted/ModItemExclusive/ModRunes/ModScalability 文件，
        导致装备上的能量词缀（如珠宝 "Meta Skills gain (4-8)% increased Energy"）被遗漏。
        v5新增第10层扫描，覆盖所有装备词缀来源。
    source_file: "Data/Skills/act_int.lua 等 + entities.db动态扫描 + tree.lua被动天赋"
    source_lines: "数据推导 + StatDescriptions驱动 + v4扩展搜索"

