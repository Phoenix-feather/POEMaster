  # 如需添加新效果，请按以下格式：
  # "技能名称":
  #   detect:
  #     type: "gem_name" | "stat_pattern"
  #     name: "技能名称" | pattern: "stat_pattern"
  #   skill_type: "active" | "aura" | "support" | "trigger"
  #   effects:
  #     - type: "mod"
  #       mod_name: "Modifier名称"
  #       mod_type: "BASE" | "INC" | "MORE" | "FLAG"
  #       value: 数值（或 null 表示动态读取）
  #       source: "来源标识"
  #       description: "效果描述"
